<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parcel Management System</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      margin-bottom: 40px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .admin-btn {
      background: #e74c3c;
    }

    .user-btn {
      background: #3498db;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<h1>📦 Parcel Management System</h1>

<div class="container">

  <!-- 👤 Customer -->
  <div class="card">
    <h2>Customer</h2>
    <button class="btn user-btn" onclick="goToUser()">
      View Order History
    </button>
  </div>

  <!-- 🛠️ Admin -->
  <div class="card">
    <h2>Admin</h2>
    <button class="btn admin-btn" onclick="goToAdmin()">
      Manage Orders
    </button>
  </div>

</div>

<script>
  function goToUser() {
    window.location.href = "./user-orders.html";
  }

  function goToAdmin() {
    window.location.href = "./admin-orders.html";
  }
</script>

</body>
</html>
